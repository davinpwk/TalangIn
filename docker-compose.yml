version: '3.9'

services:
  talangin-bot:
    build: .
    container_name: talangin-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      # Persist the SQLite database on the host
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
